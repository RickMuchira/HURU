services:
  - type: web
    name: huru-web
    env: docker
    plan: free
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: huru-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: huru-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: huru-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: huru-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: huru-db
          property: password
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: APP_KEY
        sync: false

  - type: worker
    name: huru-worker
    env: docker
    plan: free
    autoDeploy: true
    startCommand: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: huru-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: huru-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: huru-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: huru-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: huru-db
          property: password
      - key: QUEUE_CONNECTION
        value: database
      - key: APP_KEY
        sync: false

  - type: cron
    name: huru-scheduler
    env: docker
    plan: free
    autoDeploy: true
    schedule: "* * * * *"
    startCommand: php artisan schedule:run
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: huru-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: huru-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: huru-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: huru-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: huru-db
          property: password
      - key: APP_KEY
        sync: false

databases:
  - name: huru-db
    plan: free

